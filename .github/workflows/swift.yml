name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: swift build -v
    - name: Run tests
      run: swift test -v

  linux:
    runs-on: ubuntu-latest
    container: swift:6.2.0
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: swift build -v
    # Compile the test target too. The tests themselves are macOS-tuned
    # (@MainActor XCTestCase discovery + JSONSerialization key ordering) and
    # are run on the macOS job; here we verify everything compiles on Linux.
    - name: Build tests
      run: swift build --build-tests -v
